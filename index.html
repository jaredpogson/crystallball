<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#090615" />
  <title>Crystal 8 Ball</title>
  <style>
    :root {
      --bg-1: #07040f;
      --bg-2: #160d2e;
      --violet: #9a6cff;
      --cyan: #76e8ff;
      --pink: #ff80d8;
      --text: #f7f3ff;
      --muted: #c8bfdc;
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 20%, rgba(113, 69, 201, .28), transparent 34%),
        radial-gradient(circle at 15% 80%, rgba(34, 190, 220, .12), transparent 35%),
        linear-gradient(160deg, var(--bg-2), var(--bg-1) 60%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.95) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(255,255,255,.55) 0 1px, transparent 1.5px);
      background-size: 90px 90px, 145px 145px;
      background-position: 0 0, 30px 50px;
      opacity: .22;
      animation: drift 25s linear infinite;
    }

    .app {
      width: min(100%, 560px);
      min-height: 100svh;
      margin: 0 auto;
      padding: 28px 20px max(28px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      margin: 0;
      font-size: .75rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: .9;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 8vw, 4rem);
      font-weight: 500;
      letter-spacing: -.04em;
      text-shadow: 0 0 25px rgba(154,108,255,.35);
    }

    .intro {
      max-width: 430px;
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: .98rem;
    }

    .ball-wrap {
      width: min(78vw, 390px);
      aspect-ratio: 1;
      position: relative;
      display: grid;
      place-items: center;
      margin: 8px 0 2px;
      filter: drop-shadow(0 30px 34px rgba(0,0,0,.48));
    }

    .aura, .aura::before, .aura::after {
      position: absolute;
      inset: 7%;
      border-radius: 50%;
      content: "";
      border: 1px solid rgba(142, 232, 255, .18);
      box-shadow: 0 0 50px rgba(120, 97, 255, .18), inset 0 0 45px rgba(92, 216, 255, .08);
      animation: pulse 3.5s ease-in-out infinite;
    }

    .aura::before { inset: -8%; animation-delay: -1.2s; }
    .aura::after { inset: -16%; animation-delay: -2.4s; }

    .ball {
      width: 76%;
      aspect-ratio: 1;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      touch-action: manipulation;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,.75), transparent 7%),
        radial-gradient(circle at 38% 30%, rgba(171,229,255,.2), transparent 18%),
        radial-gradient(circle at 50% 55%, rgba(82,37,150,.8), transparent 55%),
        radial-gradient(circle at 58% 72%, #160a2e 0 32%, #090511 64%, #020104 100%);
      border: 2px solid rgba(255,255,255,.16);
      box-shadow:
        inset -30px -38px 65px rgba(0,0,0,.86),
        inset 22px 18px 45px rgba(166,229,255,.18),
        0 0 45px rgba(119,75,255,.45),
        0 0 100px rgba(95,224,255,.12);
      transition: transform .25s ease, filter .25s ease;
    }

    .ball:hover { transform: translateY(-3px) scale(1.012); }
    .ball:active { transform: scale(.97); }

    .ball::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        conic-gradient(from 20deg,
          transparent,
          rgba(132,232,255,.18),
          transparent 20%,
          rgba(255,128,216,.15),
          transparent 48%,
          rgba(154,108,255,.2),
          transparent 76%);
      filter: blur(14px);
      animation: swirl 10s linear infinite;
    }

    .mist {
      position: absolute;
      inset: 8%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 30% 55%, rgba(130,230,255,.22), transparent 35%),
        radial-gradient(ellipse at 68% 42%, rgba(255,120,216,.18), transparent 34%),
        radial-gradient(ellipse at 52% 70%, rgba(162,111,255,.28), transparent 40%);
      filter: blur(17px);
      animation: breathe 5s ease-in-out infinite alternate;
      opacity: .75;
    }

    .window {
      position: absolute;
      inset: 26%;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 45% 35%, rgba(116,236,255,.17), transparent 40%),
        linear-gradient(145deg, rgba(14,8,34,.75), rgba(3,2,12,.96));
      border: 1px solid rgba(159,238,255,.2);
      box-shadow: inset 0 0 35px rgba(78,48,156,.6), 0 0 32px rgba(103,225,255,.15);
      z-index: 2;
      padding: 18px;
    }

    .eight {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(4rem, 15vw, 6.2rem);
      line-height: 1;
      color: rgba(255,255,255,.88);
      text-shadow: 0 0 20px rgba(154,108,255,.75);
      transition: opacity .25s ease, transform .25s ease;
    }

    .answer {
      display: none;
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1rem, 4vw, 1.35rem);
      line-height: 1.22;
      color: #dcfbff;
      text-shadow: 0 0 12px rgba(117,232,255,.8);
    }

    .ball.revealing {
      animation: shake .75s cubic-bezier(.36,.07,.19,.97) both;
    }

    .ball.revealing .mist { animation: storm .75s ease both; }

    .ball.answered .eight { display: none; }
    .ball.answered .answer {
      display: block;
      animation: reveal .75s ease both;
    }

    .base {
      position: absolute;
      width: 58%;
      height: 18%;
      bottom: 2%;
      border-radius: 50%;
      background: linear-gradient(#1b122d, #07050c 62%);
      box-shadow: inset 0 5px 12px rgba(255,255,255,.06), 0 18px 30px rgba(0,0,0,.5);
      z-index: -1;
    }

    .controls {
      width: 100%;
      display: grid;
      gap: 12px;
    }

    textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
      color: var(--text);
      border-radius: 16px;
      padding: 15px 16px;
      font-size: 1rem;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    textarea::placeholder { color: #a69abf; }
    textarea:focus {
      border-color: rgba(118,232,255,.5);
      box-shadow: 0 0 0 4px rgba(118,232,255,.08);
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 15px 20px;
      font-size: 1rem;
      font-weight: 750;
      color: #10091d;
      background: linear-gradient(135deg, var(--cyan), #cda8ff 56%, var(--pink));
      box-shadow: 0 10px 30px rgba(136,107,255,.28), inset 0 1px 0 rgba(255,255,255,.65);
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease;
    }

    button:hover { transform: translateY(-2px); filter: brightness(1.06); }
    button:active { transform: translateY(0) scale(.98); }

    .hint {
      min-height: 1.4em;
      color: #b9aecf;
      font-size: .86rem;
      margin: 0;
    }

    .footer {
      margin-top: 4px;
      color: #7f7595;
      font-size: .75rem;
    }

    @keyframes swirl { to { transform: rotate(360deg); } }
    @keyframes drift { to { background-position: 90px 90px, 175px 195px; } }
    @keyframes pulse {
      0%,100% { transform: scale(.95); opacity: .18; }
      50% { transform: scale(1.03); opacity: .7; }
    }
    @keyframes breathe {
      from { transform: rotate(-8deg) scale(.94); opacity: .45; }
      to { transform: rotate(8deg) scale(1.08); opacity: .86; }
    }
    @keyframes shake {
      10%, 90% { transform: translate3d(-2px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-7px, 0, 0); }
      40%, 60% { transform: translate3d(7px, 0, 0); }
    }
    @keyframes storm {
      0% { transform: scale(.8) rotate(0); opacity: .4; }
      50% { transform: scale(1.35) rotate(100deg); opacity: 1; }
      100% { transform: scale(.9) rotate(180deg); opacity: .6; }
    }
    @keyframes reveal {
      0% { opacity: 0; transform: scale(.65) rotate(-5deg); filter: blur(8px); }
      100% { opacity: 1; transform: scale(1) rotate(0); filter: blur(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <p class="eyebrow">Ask the unknown</p>
    <h1>Crystal 8 Ball</h1>
    <p class="intro">Think of a question, whisper it to the universe, then tap the crystal ball to reveal your answer.</p>

    <div class="ball-wrap" aria-live="polite">
      <div class="aura"></div>
      <div class="ball" id="ball" role="button" tabindex="0" aria-label="Reveal your answer">
        <div class="mist"></div>
        <div class="window">
          <div class="eight" aria-hidden="true">8</div>
          <p class="answer" id="answer"></p>
        </div>
      </div>
      <div class="base"></div>
    </div>

    <section class="controls">
      <textarea id="question" maxlength="500" rows="4" placeholder="Type your question…" aria-label="Your question"></textarea>
      <button id="askButton" type="button">Reveal My Answer</button>
      <p class="hint" id="hint">Tap the ball or press the button.</p>
    </section>

    <div class="footer">For fun, fate, and questionable decisions.</div>
  </main>

  <script>
    const answers = [
      "It is certain.",
      "The signs point to yes.",
      "Without a doubt.",
      "You may rely on it.",
      "The universe says yes.",
      "A beautiful possibility awaits.",
      "Trust the timing.",
      "Follow the spark.",
      "Yes — but stay patient.",
      "Most likely.",
      "The path is opening.",
      "Ask again after a little time.",
      "The answer is still forming.",
      "Look within first.",
      "Proceed with care.",
      "The energy is uncertain.",
      "Not yet.",
      "Do not count on it.",
      "The stars advise against it.",
      "Choose another path.",
      "Very doubtful.",
      "Let this one go."
    ];

    const ball = document.getElementById('ball');
    const answer = document.getElementById('answer');
    const question = document.getElementById('question');
    const askButton = document.getElementById('askButton');
    const hint = document.getElementById('hint');
    let busy = false;
    let lastIndex = -1;

    function pickAnswer() {
      let index;
      do {
        index = Math.floor(Math.random() * answers.length);
      } while (answers.length > 1 && index === lastIndex);
      lastIndex = index;
      return answers[index];
    }

    function reveal() {
      if (busy) return;
      busy = true;

      ball.classList.remove('answered');
      ball.classList.add('revealing');
      answer.textContent = '';
      hint.textContent = question.value.trim()
        ? `The crystal is considering: “${question.value.trim()}”`
        : 'The crystal is listening…';

      if (navigator.vibrate) navigator.vibrate([25, 45, 35]);

      setTimeout(() => {
        ball.classList.remove('revealing');
        answer.textContent = pickAnswer();
        ball.classList.add('answered');
        hint.textContent = 'Ask another question whenever you dare.';
        busy = false;
      }, 780);
    }

    ball.addEventListener('click', reveal);
    ball.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        reveal();
      }
    });
    askButton.addEventListener('click', reveal);
    question.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') reveal();
    });
  </script>
</body>
</html>
